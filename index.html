                                <span className="material-icons" style={{ verticalAlign: 'middle', marginRight: 'var(--spacing-8)' }}>filter_list</span>
                                Filters
                            </h4>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: 'var(--spacing-16)' }}>
                                <div>
                                    <label style={{ color: 'var(--on-surface)', display: 'block', marginBottom: 'var(--spacing-8)', fontSize: '0.875rem', fontWeight: '500' }}>Filter by Day</label>
                                    <select value={invoiceFilterDay} onChange={(e) => setInvoiceFilterDay(e.target.value)} style={{ width: '100%', padding: 'var(--spacing-8)', backgroundColor: 'var(--surface-container-highest)', color: 'var(--on-surface)', border: '1px solid var(--outline-variant)', borderBottom: '2px solid var(--primary)', borderRadius: 'var(--radius-md) var(--radius-md) 0 0' }}>
                                        <option value="">All Days</option>
                                        {uniqueDays.map(day => <option key={day} value={day}>{day}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label style={{ color: 'var(--on-surface)', display: 'block', marginBottom: 'var(--spacing-8)', fontSize: '0.875rem', fontWeight: '500' }}>Filter by Referrer</label>
                                    <select value={invoiceFilterReferrer} onChange={(e) => setInvoiceFilterReferrer(e.target.value)} style={{ width: '100%', padding: 'var(--spacing-8)', backgroundColor: 'var(--surface-container-highest)', color: 'var(--on-surface)', border: '1px solid var(--outline-variant)', borderBottom: '2px solid var(--primary)', borderRadius: 'var(--radius-md) var(--radius-md) 0 0' }}>
                                        <option value="">All Referrers</option>
                                        {uniqueReferrersInvoices.map(referrer => <option key={referrer} value={referrer}>{referrer}</option>)}
                                    </select>
                                </div>
                            </div>
                        </div>

                        {/* Invoices Table */}
                        {filteredInvoices.length === 0 ? (
                            <div style={{ textAlign: 'center', color: 'var(--on-surface-variant)', padding: 'var(--spacing-32)' }}>
                                <p>No invoices found for the selected filters.</p>
                            </div>
                        ) : (
                            <div style={{ overflow: 'auto', boxShadow: 'var(--shadow-sm)', borderRadius: 'var(--radius-lg)', backgroundColor: 'var(--surface-container-low)' }}>
                                <table style={{ width: '100%', borderCollapse: 'collapse', color: 'var(--on-surface)' }}>
                                    <thead>
                                        <tr style={{ backgroundColor: 'var(--primary-container)' }}>
                                            <th style={{ padding: 'var(--spacing-12) var(--spacing-16)', textAlign: 'left', fontWeight: '600', color: 'var(--on-primary-container)', borderBottom: '1px solid var(--outline-variant)' }}>Invoice No.</th>
                                            <th style={{ padding: 'var(--spacing-12) var(--spacing-16)', textAlign: 'left', fontWeight: '600', color: 'var(--on-primary-container)', borderBottom: '1px solid var(--outline-variant)' }}>Date & Time</th>
                                            <th style={{ padding: 'var(--spacing-12) var(--spacing-16)', textAlign: 'left', fontWeight: '600', color: 'var(--on-primary-container)', borderBottom: '1px solid var(--outline-variant)' }}>Referrer</th>
                                            <th style={{ padding: 'var(--spacing-12) var(--spacing-16)', textAlign: 'left', fontWeight: '600', color: 'var(--on-primary-container)', borderBottom: '1px solid var(--outline-variant)' }}>Customer</th>
                                            <th style={{ padding: 'var(--spacing-12) var(--spacing-16)', textAlign: 'right', fontWeight: '600', color: 'var(--on-primary-container)', borderBottom: '1px solid var(--outline-variant)' }}>Subtotal (₹)</th>

                                                <button style={{ backgroundColor: 'var(--secondary-container)', color: 'var(--on-secondary-container)', border: 'none', padding: 'var(--spacing-8)', borderRadius: 'var(--radius-sm)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }} onClick={() => { setEditingReferrer(referrer); setNewReferrer({ name: referrer.name, phone: referrer.phone || '', email: referrer.email || '', address: referrer.address || '', notes: referrer.notes || '' }); }} title="Edit referrer"><span className="material-icons" style={{ fontSize: '1.125rem' }}>edit</span></button>
                                                <button style={{ backgroundColor: 'var(--error-container)', color: 'var(--error)', border: 'none', padding: 'var(--spacing-8)', borderRadius: 'var(--radius-sm)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }} onClick={() => { if (confirm(`Delete referrer "${referrer.name}"?`)) { setReferrers(prev => prev.filter(r => r.id !== referrer.id)); } }} title="Delete referrer"><span className="material-icons" style={{ fontSize: '1.125rem' }}>delete</span></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {editingReferrer && (
                            <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, backgroundColor: 'rgba(0, 0, 0, 0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000, backdropFilter: 'blur(4px)' }}>
                                <div style={{ backgroundColor: 'var(--surface-container-low)', padding: 'var(--spacing-24)', borderRadius: 'var(--radius-lg)', border: '1px solid var(--outline-variant)', maxWidth: '500px', width: '90%', boxShadow: 'var(--shadow-lg)' }}>
                                    <h4 style={{ color: 'var(--primary)', marginTop: 0, marginBottom: 'var(--spacing-20)', fontSize: '1.25rem', fontWeight: '600' }}>Edit Referrer</h4>
                                    <form onSubmit={(e) => {
                                        e.preventDefault();
                                        if (!newReferrer.name.trim()) return;
                                        setReferrers(prev => prev.map(r => r.id === editingReferrer.id ? { ...r, name: newReferrer.name.trim(), phone: newReferrer.phone.trim(), email: newReferrer.email.trim(), address: newReferrer.address.trim(), notes: newReferrer.notes.trim() } : r));
                                        setEditingReferrer(null);
                                        setNewReferrer({ name: '', phone: '', email: '', address: '', notes: '' });
                                    }}>
                                        <div style={{ display: 'grid', gap: 'var(--spacing-16)' }}>
                                            <div><label style={{ color: 'var(--on-surface)', display: 'block', marginBottom: 'var(--spacing-8)', fontSize: '0.875rem', fontWeight: '500' }}>Full Name *</label><input type="text" value={newReferrer.name} onChange={(e) => setNewReferrer(prev => ({ ...prev, name: e.target.value }))} required style={{ width: '100%', padding: 'var(--spacing-12)', backgroundColor: 'var(--surface-container-highest)', color: 'var(--on-surface)', border: '1px solid var(--outline-variant)', borderBottom: '2px solid var(--primary)', borderRadius: 'var(--radius-md) var(--radius-md) 0 0', fontSize: '1rem' }} /></div>
                                            <div><label style={{ color: 'var(--on-surface)', display: 'block', marginBottom: 'var(--spacing-8)', fontSize: '0.875rem', fontWeight: '500' }}>Phone Number</label><input type="tel" value={newReferrer.phone} onChange={(e) => setNewReferrer(prev => ({ ...prev, phone: e.target.value }))} style={{ width: '100%', padding: 'var(--spacing-12)', backgroundColor: 'var(--surface-container-highest)', color: 'var(--on-surface)', border: '1px solid var(--outline-variant)', borderBottom: '2px solid var(--primary)', borderRadius: 'var(--radius-md) var(--radius-md) 0 0', fontSize: '1rem' }} /></div>
                                            <div><label style={{ color: 'var(--on-surface)', display: 'block', marginBottom: 'var(--spacing-8)', fontSize: '0.875rem', fontWeight: '500' }}>Email Address</label><input type="email" value={newReferrer.email} onChange={(e) => setNewReferrer(prev => ({ ...prev, email: e.target.value }))} style={{ width: '100%', padding: 'var(--spacing-12)', backgroundColor: 'var(--surface-container-highest)', color: 'var(--on-surface)', border: '1px solid var(--outline-variant)', borderBottom: '2px solid var(--primary)', borderRadius: 'var(--radius-md) var(--radius-md) 0 0', fontSize: '1rem' }} /></div>
                                            <div><label style={{ color: 'var(--on-surface)', display: 'block', marginBottom: 'var(--spacing-8)', fontSize: '0.875rem', fontWeight: '500' }}>Address</label><input type="text" value={newReferrer.address} onChange={(e) => setNewReferrer(prev => ({ ...prev, address: e.target.value }))} style={{ width: '100%', padding: 'var(--spacing-12)', backgroundColor: 'var(--surface-container-highest)', color: 'var(--on-surface)', border: '1px solid var(--outline-variant)', borderBottom: '2px solid var(--primary)', borderRadius: 'var(--radius-md) var(--radius-md) 0 0', fontSize: '1rem' }} /></div>
                                            <div><label style={{ color: 'var(--on-surface)', display: 'block', marginBottom: 'var(--spacing-8)', fontSize: '0.875rem', fontWeight: '500' }}>Notes</label><textarea value={newReferrer.notes} onChange={(e) => setNewReferrer(prev => ({ ...prev, notes: e.target.value }))} rows="2" style={{ width: '100%', padding: 'var(--spacing-12)', backgroundColor: 'var(--surface-container-highest)', color: 'var(--on-surface)', border: '1px solid var(--outline-variant)', borderBottom: '2px solid var(--primary)', borderRadius: 'var(--radius-md) var(--radius-md) 0 0', fontSize: '1rem', resize: 'vertical', minHeight: '60px' }} /></div>
                                        </div>
                                        <div style={{ display: 'flex', gap: 'var(--spacing-12)', justifyContent: 'flex-end', marginTop: 'var(--spacing-20)' }}>
                                            <button type="button" onClick={() => { setEditingReferrer(null); setNewReferrer({ name: '', phone: '', email: '', address: '', notes: '' }); }} style={{ backgroundColor: 'var(--surface-container-highest)', color: 'var(--on-surface)', border: '1px solid var(--outline)', padding: 'var(--spacing-10) var(--spacing-16)', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontWeight: '500' }}>Cancel</button>
                                            <button type="submit" style={{ backgroundColor: 'var(--primary)', color: 'var(--on-primary)', border: 'none', padding: 'var(--spacing-10) var(--spacing-16)', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontWeight: '600', display: 'flex', alignItems: 'center', gap: 'var(--spacing-8)' }}><span className="material-icons" style={{ fontSize: '1.125rem' }}>save</span> Update Referrer</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            // --- MAIN RENDER LOGIC --- //

            //                 <h1 style={{ marginBottom: 'var(--spacing-8)', color: 'var(--primary)' }}>A2Z Collection</h1>

            //                         <label style={{ display: 'block', marginBottom: 'var(--spacing-8)', fontWeight: '600' }}>User ID</label>
            //                         <input 
            //                             type="text"

            //                         <p style={{ fontSize: '0.875rem', fontWeight: '600', margin: '0 0 var(--spacing-8) 0', color: 'var(--primary)' }}>Local JSON Setup (Optional)</p>

            //         </div>

            if (!isAuthenticated) {
                return (
                    <div className="login-wrapper">
                        <motion.div className="login-card" initial={{ opacity: 0, y: 24, scale: 0.97 }} animate={{ opacity: 1, y: 0, scale: 1 }} transition={{ duration: 0.3, ease: [0.23, 1, 0.32, 1] }}>
                            <h1 style={{ marginBottom: 'var(--spacing-8)', color: 'var(--primary)' }}>A2Z Collection</h1>
                            <p style={{ marginBottom: 'var(--spacing-32)' }}>Inventory & Point of Sale System</p>

                            <form onSubmit={handleLoginSubmit}>
                                <div style={{ textAlign: 'left', marginBottom: 'var(--spacing-16)' }}>
                                    <label style={{ display: 'block', marginBottom: 'var(--spacing-8)', fontWeight: '600' }}>User ID</label>
                                    <input type="text" value={loginInput.userId} onChange={(e) => setLoginInput({ ...loginInput, userId: e.target.value })} placeholder="Default: admin" required style={{ width: '100%' }} />
                                </div>
                                <div style={{ textAlign: 'left', marginBottom: 'var(--spacing-24)' }}>
                                    <label style={{ display: 'block', marginBottom: 'var(--spacing-8)', fontWeight: '600' }}>Password</label>
                                    <input type="password" value={loginInput.password} onChange={(e) => setLoginInput({ ...loginInput, password: e.target.value })} placeholder="Default: admin" required style={{ width: '100%' }} />
                                </div>

                                <button type="submit" className="action-btn" style={{ padding: 'var(--spacing-16)', fontSize: '1.125rem' }}>Login to POS</button>

                                <button type="button" onClick={() => {
                                    localStorage.clear();
                                    alert("App reset to factory defaults. Please login with 'admin' and 'admin'.");
                                    window.location.reload();
                                }} style={{ marginTop: 'var(--spacing-16)', background: 'transparent', border: '1px solid var(--error)', color: 'var(--error)', padding: 'var(--spacing-8)', borderRadius: 'var(--radius-md)', width: '100%', cursor: 'pointer' }}>
                                    Locked out? Factory Reset App
                                </button>
                            </form>
                        </motion.div>
                    </div>
                );
            }

            return (
                <div className="container">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 'var(--spacing-32)' }}>
                        <h1>A2Z Collection</h1>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--spacing-16)' }}>
                            <select
                                value={currentTheme}
                                onChange={(e) => setCurrentTheme(e.target.value)}
                                style={{
                                    padding: 'var(--spacing-8)',
                                    borderRadius: 'var(--radius-md)',
                                    backgroundColor: 'var(--surface-container-high)',
                                    color: 'var(--on-surface)',
                                    border: '1px solid var(--outline-variant)',
                                    cursor: 'pointer',
                                    width: 'auto',
                                    fontSize: '0.875rem',
                                    fontWeight: '600'
                                }}
                            >
                                <option value="default">Corporate Blue</option>
                                <option value="peacock">Peacock & Gold</option>
                                <option value="dark">Dark Mode</option>
                                <option value="terracotta">Earthy Terracotta</option>
                            </select>

                            <div className="profile-icon" onClick={() => setCurrentTab('profile')} title="User Profile">
                                <span className="material-icons">account_circle</span>
                            </div>

                            <div className="power-icon" onClick={confirmLogout} title="Logout">
                                <span className="material-icons">power_settings_new</span>
                            </div>
                        </div>
                    </div>
                    <div className="nav-tabs">
                        <button className={`tab-btn ${currentTab === 'grid' ? 'active' : ''}`} onClick={() => setCurrentTab('grid')}><span className="material-icons">grid_view</span> Product Catalog</button>
                        <button className={`tab-btn ${currentTab === 'pos' ? 'active' : ''}`} onClick={() => setCurrentTab('pos')}><span className="material-icons">point_of_sale</span> POS / Billing</button>
                        <button className={`tab-btn ${currentTab === 'admin' ? 'active' : ''}`} onClick={() => setCurrentTab('admin')}><span className="material-icons">settings</span> Manage Inventory</button>
                        <button className={`tab-btn ${currentTab === 'referrers' ? 'active' : ''}`} onClick={() => setCurrentTab('referrers')}><span className="material-icons">people</span> Referrers</button>
                        <button className={`tab-btn ${currentTab === 'salesanalytics' ? 'active' : ''}`} onClick={() => setCurrentTab('salesanalytics')}><span className="material-icons">trending_up</span> Sales Analytics</button>
                        <button className={`tab-btn ${currentTab === 'customers' ? 'active' : ''}`} onClick={() => setCurrentTab('customers')}><span className="material-icons">contacts</span> Customers</button>
                        <button className={`tab-btn ${currentTab === 'ledger' ? 'active' : ''}`} onClick={() => setCurrentTab('ledger')}><span className="material-icons">analytics</span> Sales Ledger</button>
                    </div>
                    <AnimatePresence mode="wait">
                        <motion.div key={currentTab} variants={tabVariants} initial="initial" animate="animate" exit="exit">
                            {currentTab === 'grid' && renderGridTab()}
                            {currentTab === 'pos' && renderPOSTab()}
                            {currentTab === 'admin' && renderAdminTab()}
                            {currentTab === 'referrers' && renderReferrersTab()}
                            {currentTab === 'salesanalytics' && renderSalesAnalyticsTab()}
                            {currentTab === 'customers' && renderCustomersTab()}
                            {currentTab === 'ledger' && renderLedgerTab()}
                            {currentTab === 'profile' && renderProfileTab()}
                        </motion.div>
                    </AnimatePresence>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
