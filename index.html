<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A2Z Collection - POS & Inventory</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.18.0/dist/framer-motion.js"></script>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Inter:wght@100..900&display=swap"
        rel="stylesheet">

    <style>
        /* A2Z Collection Design System - Theme Engine */

        /* 1. Default Corporate Blue Theme */
        :root,
        [data-theme="default"] {
            --primary: #001451;
            --primary-container: #002581;
            --on-primary: #ffffff;
            --on-primary-container: #dbe1ff;

            --secondary: #5c5d72;
            --secondary-container: #e0e0ff;
            --secondary-fixed: #e0e0ff;
            --on-secondary: #ffffff;
            --on-secondary-container: #181a2c;
            --on-secondary-fixed: #181a2c;

            --tertiary: #380b00;
            --tertiary-container: #5c1800;
            --on-tertiary: #ffffff;
            --on-tertiary-container: #ffdad1;

            --surface: #f4faff;
            --surface-container-low: #e9f6fd;
            --surface-container-lowest: #ffffff;
            --surface-container-high: #ddeaf2;
            --surface-container-highest: #d7e4ec;
            --surface-variant: #dbe1ff;
            --surface-tint: #5c5d72;

            --on-surface: #111d23;
            --on-surface-variant: #454652;
            --outline-variant: #c6c5d4;

            --success: #146c2e;
            --success-container: #a6f5b3;
            --error: #ba1a1a;
            --error-container: #ffdad6;
            --warning: #5c1800;

            /* Universal Base Spacing & Typography */
            --spacing-4: 0.25rem;
            --spacing-8: 0.5rem;
            --spacing-12: 0.75rem;
            --spacing-16: 1rem;
            --spacing-20: 1.25rem;
            --spacing-24: 1.5rem;
            --spacing-32: 2rem;
            --spacing-40: 2.5rem;

            --radius-sm: 0.25rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-full: 9999px;

            --font-display: 'Manrope', sans-serif;
            --font-body: 'Inter', sans-serif;

            --shadow-sm: 0 1px 2px 0 rgba(17, 29, 35, 0.06);
            --shadow-md: 0 4px 6px -1px rgba(17, 29, 35, 0.06), 0 2px 4px -1px rgba(17, 29, 35, 0.03);
            --shadow-lg: 0 10px 15px -3px rgba(17, 29, 35, 0.06), 0 4px 6px -2px rgba(17, 29, 35, 0.03);
            --shadow-xl: 0 20px 25px -5px rgba(17, 29, 35, 0.06), 0 10px 10px -5px rgba(17, 29, 35, 0.03);
        }

        /* 2. Peacock & Gold Theme */
        [data-theme="peacock"] {
            --primary: #006064;
            --primary-container: #00838f;
            --on-primary: #ffffff;
            --on-primary-container: #e0f7fa;

            --secondary: #f9a825;
            --secondary-container: #fff9c4;
            --secondary-fixed: #ffecb3;
            --on-secondary: #000000;
            --on-secondary-container: #3e2723;
            --on-secondary-fixed: #3e2723;

            --surface: #fffdf8;
            --surface-container-low: #fcf4e8;
            --surface-container-lowest: #ffffff;
            --surface-container-high: #f7ead4;
            --surface-container-highest: #f0debe;
            --surface-variant: #e0f7fa;

            --on-surface: #263238;
            --on-surface-variant: #546e7a;
            --outline-variant: #b0bec5;
        }

        /* 3. Dark Mode */
        [data-theme="dark"] {
            --primary: #90caf9;
            --primary-container: #004c8c;
            --on-primary: #000000;
            --on-primary-container: #c3e8ff;

            --secondary: #b0bec5;
            --secondary-container: #455a64;
            --secondary-fixed: #455a64;
            --on-secondary: #000000;
            --on-secondary-container: #eceff1;
            --on-secondary-fixed: #eceff1;

            --surface: #121212;
            --surface-container-low: #1e1e1e;
            --surface-container-lowest: #000000;
            --surface-container-high: #2c2c2c;
            --surface-container-highest: #383838;
            --surface-variant: #424242;

            --on-surface: #e3e3e3;
            --on-surface-variant: #aaaaaa;
            --outline-variant: #5c5c5c;

            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        /* 4. Earthy Terracotta */
        [data-theme="terracotta"] {
            --primary: #bf360c;
            --primary-container: #d84315;
            --on-primary: #ffffff;
            --on-primary-container: #fbe9e7;

            --secondary: #8d6e63;
            --secondary-container: #d7ccc8;
            --secondary-fixed: #d7ccc8;
            --on-secondary: #ffffff;
            --on-secondary-container: #3e2723;
            --on-secondary-fixed: #3e2723;

            --surface: #fdfaf8;
            --surface-container-low: #f9ebe8;
            --surface-container-lowest: #ffffff;
            --surface-container-high: #f4dbd4;
            --surface-container-highest: #ecd1c8;
            --surface-variant: #ffccbc;

            --on-surface: #3e2723;
            --on-surface-variant: #5d4037;
            --outline-variant: #bcaaa4;
        }

        /* Global Styles */
        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--surface);
            color: var(--on-surface);
            font-family: var(--font-body);
            margin: 0;
            padding: var(--spacing-20);
            line-height: 1.5;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Typography Hierarchy */
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: var(--font-display);
            font-weight: 600;
            margin: 0 0 var(--spacing-16) 0;
            color: var(--on-surface);
            transition: color 0.3s ease;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: var(--spacing-32);
            color: var(--primary);
        }

        h2 {
            font-size: 2rem;
            margin-bottom: var(--spacing-24);
        }

        h3 {
            font-size: 1.5rem;
            margin-bottom: var(--spacing-20);
        }

        h4 {
            font-size: 1.25rem;
            margin-bottom: var(--spacing-16);
        }

        p {
            margin: 0 0 var(--spacing-16) 0;
            color: var(--on-surface-variant);
        }

        /* Navigation */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: var(--spacing-16);
            margin-bottom: var(--spacing-32);
            flex-wrap: wrap;
        }

        .tab-btn {
            background: var(--surface-container-low);
            color: var(--on-surface);
            border: none;
            padding: var(--spacing-12) var(--spacing-20);
            border-radius: var(--radius-xl);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .tab-btn:hover {
            background: var(--surface-container-high);
            box-shadow: var(--shadow-md);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-container) 100%);
            color: var(--on-primary);
            font-weight: 600;
            box-shadow: var(--shadow-md);
        }

        /* Cards */
        .card {
            background-color: var(--surface-container-lowest);
            padding: var(--spacing-24);
            border-radius: var(--radius-lg);
            margin-bottom: var(--spacing-24);
            box-shadow: var(--shadow-md);
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: var(--spacing-20);
            display: flex;
            flex-direction: column;
        }

        .row-group {
            display: flex;
            gap: var(--spacing-16);
        }

        .row-group>div {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: var(--spacing-8);
            font-weight: 500;
            color: var(--on-surface);
            font-size: 0.875rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .currency-symbol {
            position: absolute;
            left: var(--spacing-12);
            color: var(--on-surface-variant);
            font-weight: 600;
            font-size: 0.875rem;
        }

        .input-wrapper input {
            padding-left: calc(var(--spacing-12) + var(--spacing-20));
            width: calc(100% - var(--spacing-32));
        }

        input,
        select,
        textarea {
            padding: var(--spacing-12);
            background-color: var(--surface-container-highest);
            border: 1px solid var(--outline-variant);
            border-bottom: 2px solid transparent;
            color: var(--on-surface);
            border-radius: var(--radius-md);
            width: 100%;
            font-family: var(--font-body);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-bottom-color: var(--primary);
            background-color: var(--surface-container-lowest);
            box-shadow: 0 0 0 2px rgba(0, 20, 81, 0.1);
        }

        /* Buttons */
        button.action-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-container) 100%);
            color: var(--on-primary);
            border: none;
            padding: var(--spacing-12) var(--spacing-16);
            font-weight: 600;
            cursor: pointer;
            border-radius: var(--radius-xl);
            margin-top: var(--spacing-12);
            width: 100%;
            font-size: 1rem;
            font-family: var(--font-body);
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        button.action-btn:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-1px);
        }

        .btn-sm {
            padding: var(--spacing-8) var(--spacing-12);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            margin-left: var(--spacing-8);
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .btn-edit {
            background-color: var(--success-container);
            color: var(--success);
        }

        .btn-edit:hover {
            background-color: var(--success);
            color: white;
        }

        .btn-delete {
            background-color: var(--error-container);
            color: var(--error);
        }

        .btn-delete:hover {
            background-color: var(--error);
            color: white;
        }

        /* Special Elements */
        .barcode-container {
            background-color: #ffffff;
            /* Barcodes must remain white BG for scanners */
            padding: var(--spacing-12);
            border-radius: var(--radius-md);
            display: inline-block;
            margin-top: var(--spacing-12);
        }

        .color-box {
            width: 30px;
            height: 30px;
            display: inline-block;
            vertical-align: middle;
            margin-left: var(--spacing-12);
            border-radius: var(--radius-md);
        }

        .img-preview {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: var(--radius-md);
        }

        .size-badge {
            display: inline-block;
            background: var(--secondary-container);
            color: var(--on-secondary-container);
            padding: var(--spacing-4) var(--spacing-8);
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: 0.75rem;
            margin-top: var(--spacing-8);
        }

        /* Grid View Styles */
        .search-bar {
            width: 100%;
            padding: var(--spacing-16);
            font-size: 1rem;
            margin-bottom: var(--spacing-24);
            background: var(--surface-container-highest);
            border: none;
            border-bottom: 2px solid var(--primary);
            color: var(--on-surface);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            font-family: var(--font-body);
        }

        .category-section {
            margin-bottom: var(--spacing-40);
        }

        .category-title {
            color: var(--on-surface);
            padding-bottom: var(--spacing-8);
            margin-bottom: var(--spacing-16);
            font-family: var(--font-display);
            font-weight: 600;
            position: relative;
        }

        .category-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, var(--primary) 0%, var(--surface-tint) 100%);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: var(--spacing-20);
        }

        .product-card {
            background: var(--surface-container-lowest);
            border-radius: var(--radius-lg);
            padding: var(--spacing-16);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
        }

        .product-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .product-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-12);
        }

        .product-card h4 {
            margin: var(--spacing-4) 0;
            color: var(--primary);
            font-size: 1.125rem;
        }

        .product-card .prices {
            background: var(--surface-container-high);
            padding: var(--spacing-8);
            border-radius: var(--radius-md);
            margin: var(--spacing-12) 0;
            font-size: 0.875rem;
        }

        /* POS Styles */
        .pos-layout {
            display: flex;
            gap: var(--spacing-24);
        }

        .pos-main {
            flex: 2;
        }

        .pos-sidebar {
            flex: 1;
            background: var(--surface-container-low);
            padding: var(--spacing-20);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: var(--shadow-md);
        }

        .scanner-input {
            font-size: 1.5rem;
            padding: var(--spacing-16);
            text-align: center;
            letter-spacing: 2px;
            border: 2px solid var(--success);
            background: var(--surface-container-highest);
            color: var(--on-surface);
            border-radius: var(--radius-lg);
            font-family: 'Courier New', monospace;
            font-variant-numeric: tabular-nums;
        }

        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 var(--spacing-4);
            margin-top: var(--spacing-20);
        }

        .data-table th,
        .data-table td {
            padding: var(--spacing-12);
            text-align: left;
            background: var(--surface-container-lowest);
            color: var(--on-surface);
        }

        .data-table th {
            color: var(--primary);
            font-weight: 600;
            background: var(--surface-container-high);
            font-size: 0.875rem;
        }

        .data-table tbody tr:nth-child(even) td {
            background: var(--surface-container-high);
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: var(--spacing-8);
        }

        .qty-btn {
            background: var(--surface-container-high);
            color: var(--on-surface);
            border: none;
            padding: var(--spacing-8) var(--spacing-12);
            cursor: pointer;
            border-radius: var(--radius-md);
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .qty-btn:hover {
            background: var(--primary);
            color: var(--on-primary);
        }

        .totals-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: var(--spacing-12);
            font-size: 1.125rem;
            font-weight: 500;
            color: var(--on-surface);
        }

        .grand-total {
            font-size: 1.5rem;
            color: var(--primary);
            font-weight: 700;
            font-family: var(--font-display);
            border-top: 2px solid var(--primary);
            padding-top: var(--spacing-12);
            margin-top: var(--spacing-12);
        }

        /* Ledger Styles */
        .ledger-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-24);
        }

        .ledger-stat {
            background: var(--surface-container-low);
            padding: var(--spacing-16) var(--spacing-24);
            border-radius: var(--radius-lg);
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .ledger-stat h2 {
            margin: 0;
            color: var(--on-surface);
            font-size: 1.75rem;
            font-family: var(--font-display);
            font-weight: 700;
        }

        .ledger-stat span {
            color: var(--on-surface-variant);
            font-size: 0.875rem;
        }

        .view-toggle {
            display: flex;
            gap: var(--spacing-8);
        }

        .view-btn {
            padding: var(--spacing-8) var(--spacing-16);
            border-radius: var(--radius-md);
            border: 1px solid var(--primary);
            background: transparent;
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.3s ease;
        }

        .view-btn.active {
            background: var(--primary);
            color: var(--on-primary);
        }

        .view-btn:hover {
            background: var(--primary-container);
            color: var(--on-primary-container);
        }

        /* Header Icons & Themes */
        .material-icons {
            font-size: 1.125rem;
            vertical-align: middle;
            margin-right: var(--spacing-8);
        }

        .profile-icon {
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--primary);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .profile-icon:hover {
            color: var(--primary-container);
            transform: scale(1.1);
        }

        .power-icon {
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--error);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .power-icon:hover {
            transform: scale(1.1);
            filter: brightness(1.2);
        }

        /* Login Screen */
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary) 0%, var(--surface-container-highest) 100%);
            padding: var(--spacing-20);
        }

        .login-card {
            background: var(--surface-container-lowest);
            padding: var(--spacing-40);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 460px;
            text-align: center;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: var(--spacing-12);
            }

            .nav-tabs {
                gap: var(--spacing-8);
            }

            .tab-btn {
                padding: var(--spacing-8) var(--spacing-12);
                font-size: 0.875rem;
            }

            .pos-layout {
                flex-direction: column;
                gap: var(--spacing-16);
            }

            .grid-container {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: var(--spacing-16);
            }

            .row-group {
                flex-direction: column;
                gap: var(--spacing-12);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, AnimatePresence } = Motion;

        // GPU-accelerated animation variants (opacity + transform only)
        const tabVariants = {
            initial: { opacity: 0, y: 10 },
            animate: { opacity: 1, y: 0, transition: { duration: 0.18, ease: [0.23, 1, 0.32, 1] } },
            exit: { opacity: 0, y: -6, transition: { duration: 0.12 } }
        };
        const cardContainerVariants = {
            hidden: {},
            visible: { transition: { staggerChildren: 0.05 } }
        };
        const cardVariants = {
            hidden: { opacity: 0, y: 16, scale: 0.97 },
            visible: { opacity: 1, y: 0, scale: 1, transition: { duration: 0.22, ease: [0.23, 1, 0.32, 1] } }
        };
        const rowVariants = {
            hidden: { opacity: 0, x: -12 },
            visible: { opacity: 1, x: 0, transition: { duration: 0.18, ease: 'easeOut' } },
            exit: { opacity: 0, x: 12, transition: { duration: 0.12 } }
        };

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { console.error('Error caught:', error, errorInfo); }
            render() {
                if (this.state.hasError) {
                    return React.createElement('div', { style: { padding: '20px', backgroundColor: '#1e293b', color: '#ef4444', borderRadius: '8px', textAlign: 'center', margin: '20px' } },
                        React.createElement('h2', null, 'Something went wrong'),
                        React.createElement('p', null, 'Please refresh the page to try again.'),
                        React.createElement('details', { style: { textAlign: 'left', marginTop: '20px' } },
                            React.createElement('summary', null, 'Error Details'),
                            React.createElement('pre', { style: { color: '#94a3b8', fontSize: '12px' } }, this.state.error?.toString())
                        )
                    );
                }
                return this.props.children;
            }
        }

        const App = () => {
            // --- USER PROFILE & THEME STATE --- //

            const getNearestColorName = (targetRgb) => {
                if (colorNamesList.length === 0) return "Loading...";
                let minDistance = Infinity; let closestName = "Unknown";
                for (let i = 0; i < colorNamesList.length; i++) {
                    const c = colorNamesList[i];
                    const dist = Math.sqrt(Math.pow(targetRgb[0] - c.rgb[0], 2) + Math.pow(targetRgb[1] - c.rgb[1], 2) + Math.pow(targetRgb[2] - c.rgb[2], 2));
                    if (dist < minDistance) { minDistance = dist; closestName = c.name; }
                }
                return closestName;
            };
            const getWeekNumber = (date) => {
                const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
                const dayNum = d.getUTCDay() || 7;
                d.setUTCDate(d.getUTCDate() + 4 - dayNum);
                const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
                return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            };

            const getSalesmanSales = (salesmanName, period) => {
                let filtered = salesLedger.filter(sale => sale.referrer === salesmanName);
                const now = new Date();

                switch (period) {
                    case 'today': {
                        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                        filtered = filtered.filter(s => new Date(s.date) >= today && new Date(s.date) < new Date(today.getTime() + 86400000));
                        break;
                    }
                    case 'week': {
                        const curr = new Date(now);
                        const first = curr.getDate() - curr.getDay();
                        const weekStart = new Date(curr.setDate(first));
                        weekStart.setHours(0, 0, 0, 0);
                        filtered = filtered.filter(s => new Date(s.date) >= weekStart);
                        break;
                    }
                    case 'month': {
                        const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
                        filtered = filtered.filter(s => new Date(s.date) >= monthStart);
                        break;
                    }
                    case 'quarter': {
                        const quarter = Math.floor(now.getMonth() / 3);
                        const quarterStart = new Date(now.getFullYear(), quarter * 3, 1);
                        const quarterEnd = new Date(now.getFullYear(), quarter * 3 + 3, 0);
                        filtered = filtered.filter(s => {
                            const sDate = new Date(s.date);
                            return sDate >= quarterStart && sDate <= quarterEnd;
                        });
                        break;

                    case 'custom': {

                        const img = new Image(); img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas'); const MAX_WIDTH = 400; const scaleSize = MAX_WIDTH / img.width;
                            canvas.width = MAX_WIDTH; canvas.height = img.height * scaleSize;
                            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                        };
                    };
                });

                                    <table className="data-table">
                                        <thead><tr><th>Product</th><th>Color</th><th>Size</th><th>Stock</th><th>Price</th><th>Qty</th><th>Total</th><th></th></tr></thead>
                                        <tbody>
                                            <AnimatePresence>
                                            {invoiceItems.length === 0 ? (<tr><td colSpan="8" style={{ textAlign: 'center', color: 'var(--on-surface-variant)', padding: 'var(--spacing-20)' }}>No items scanned yet.</td></tr>) : (
                                                invoiceItems.map(item => {
                                                    // Find the variant in the catalog
                                                    const dbProduct = catalog.find(c => c.id === item.id);
                                                    let variant = null;
                                                    if (dbProduct && dbProduct.variants) {
                                                        variant = dbProduct.variants.find(v => v.barcode === item.barcode);
                                                    }
                                                    const stockLeft = variant ? variant.stockQty - item.qty : 0;
                                                    return (
                                                        <motion.tr key={item.barcode} variants={rowVariants} initial="hidden" animate="visible" exit="exit">
                                                            <td style={{ fontWeight: '600' }}>{item.name}<br /><small style={{ color: 'var(--on-surface-variant)' }}>{item.id}</small></td>
                                                            <td>{item.colorName}</td>
                                                            <td><span className="size-badge">{item.size}</span></td>
                                                            <td style={{ color: stockLeft <= 2 ? 'var(--error)' : 'var(--on-surface-variant)' }}>{stockLeft}</td>
                                                            <td>₹{item.sellPrice}</td>
                                                            <td><div className="qty-controls"><button className="qty-btn" onClick={() => updateQty(item.barcode, -1)}>-</button><span style={{ fontWeight: 'bold', width: '20px', textAlign: 'center' }}>{item.qty}</span><button className="qty-btn" onClick={() => updateQty(item.barcode, 1)}>+</button></div></td>
                                                            <td style={{ fontWeight: 'bold' }}>₹{(item.sellPrice * item.qty).toFixed(2)}</td>
                                                            <td><button className="btn-sm btn-delete" onClick={() => removeFromInvoice(item.barcode)}><span className="material-icons">delete</span></button></td>
                                                        </motion.tr>
                                                    );
                                                })

                            </div>
                        </div>
                        <div className="pos-sidebar">
                            <div>
                                <h3 style={{ marginTop: 0, marginBottom: 'var(--spacing-16)', color: 'var(--primary)' }}>Bill Summary</h3>
                                <div className="totals-row"><span style={{ color: 'var(--on-surface-variant)' }}>Subtotal:</span><span>₹{subtotal.toFixed(2)}</span></div>
                                <div style={{ marginTop: 'var(--spacing-16)', marginBottom: 'var(--spacing-16)' }}>
                                    <label style={{ color: 'var(--on-surface-variant)', fontSize: '0.875rem' }}>Discount (%)</label>
                                    <input type="number" min="0" max="100" value={discountPercentage} onChange={(e) => setDiscountPercentage(e.target.value)} style={{ fontSize: '1rem', textAlign: 'right', marginTop: 'var(--spacing-4)', width: '100%', padding: 'var(--spacing-8)', backgroundColor: 'var(--surface-container-highest)', border: '1px solid var(--outline-variant)', borderBottom: '2px solid var(--primary)', borderRadius: 'var(--radius-md) var(--radius-md) 0 0', color: 'var(--on-surface)' }} />
                                </div>
                                {discountPercentage > 0 && (<div className="totals-row" style={{ color: 'var(--success)' }}><span>Discount Amount:</span><span>-₹{discountAmount.toFixed(2)}</span></div>)}

                                <div style={{ marginTop: 'var(--spacing-16)', marginBottom: 'var(--spacing-16)' }}>
                                    <label style={{ color: 'var(--on-surface-variant)', fontSize: '0.875rem' }}>Refer by</label>
                                    <select value={selectedReferrer} onChange={(e) => setSelectedReferrer(e.target.value)} style={{ width: '100%', padding: 'var(--spacing-8)', backgroundColor: 'var(--surface-container-highest)', color: 'var(--on-surface)', border: '1px solid var(--outline-variant)', borderBottom: '2px solid var(--primary)', borderRadius: 'var(--radius-md) var(--radius-md) 0 0', marginTop: 'var(--spacing-4)' }}>

                );
            };

            // 3. Ledger Tab
            const renderLedgerTab = () => {
                const totalRevenue = salesLedger.reduce((sum, sale) => sum + sale.grandTotal, 0);
                const totalInvoices = salesLedger.length;
                const calendarData = getCalendarData(currentCalendarDate);
                const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

                return (
                    <div className="card">
                        <div className="ledger-header">
                            <div className="ledger-stat">
                                <h2>₹{totalRevenue.toFixed(2)}</h2>
                                <span>Total Lifetime Revenue</span>
                            </div>
                            <div className="ledger-stat">
                                <h2>{totalInvoices}</h2>
                                <span>Total Invoices Generated</span>
                            </div>
                            <div style={{ display: 'flex', gap: 'var(--spacing-8)', alignItems: 'center' }}>
                                <button onClick={() => window.print()} style={{ backgroundColor: 'var(--success)', color: 'var(--on-success)', border: 'none', padding: 'var(--spacing-8) var(--spacing-16)', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontWeight: '600', display: 'flex', alignItems: 'center', gap: 'var(--spacing-8)', fontSize: '0.875rem' }} title="Print Sales Report">
                                    <span className="material-icons">print</span> Print Report
                                </button>
                                <div className="view-toggle">
                                    <button className={`view-btn ${ledgerView === 'table' ? 'active' : ''}`} onClick={() => setLedgerView('table')}><span className="material-icons">table_chart</span> Table View</button>
                                    <button className={`view-btn ${ledgerView === 'chart' ? 'active' : ''}`} onClick={() => setLedgerView('chart')}><span className="material-icons">bar_chart</span> Chart View</button>
                                    <button className={`view-btn ${ledgerView === 'calendar' ? 'active' : ''}`} onClick={() => setLedgerView('calendar')}><span className="material-icons">calendar_month</span> Calendar View</button>
                                </div>
                            </div>
                        </div>
                        {ledgerView === 'chart' && (
                            <div style={{ marginBottom: '20px', textAlign: 'center' }}>
                                <label style={{ color: 'var(--primary)', marginRight: '10px' }}>Select Period:</label>
                                <select value={selectedPeriod} onChange={(e) => setSelectedPeriod(e.target.value)} style={{ width: '200px', display: 'inline-block' }}>
                                    <option value="daily">Daily</option>
                                    <option value="weekly">Weekly</option>
                                    <option value="monthly">Monthly</option>
                                    <option value="yearly">Yearly</option>
                                </select>
                            </div>
                        )}
                        {ledgerView === 'calendar' && (
                            <div style={{ marginBottom: 'var(--spacing-20)', textAlign: 'center' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 'var(--spacing-20)' }}>
                                    <button onClick={() => navigateMonth(-1)} style={{ backgroundColor: 'var(--secondary)', color: 'var(--on-secondary)', border: 'none', padding: 'var(--spacing-8) var(--spacing-16)', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontWeight: '600' }}>◀ Previous</button>
                                    <h3 style={{ color: 'var(--secondary)', margin: 0, fontSize: '1.25rem' }}>{monthNames[currentCalendarDate.getMonth()]} {currentCalendarDate.getFullYear()}</h3>
                                    <button onClick={() => navigateMonth(1)} style={{ backgroundColor: 'var(--secondary)', color: 'var(--on-secondary)', border: 'none', padding: 'var(--spacing-8) var(--spacing-16)', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontWeight: '600' }}>Next ▶</button>
                                </div>
                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 'var(--spacing-4)', backgroundColor: 'var(--surface-container-low)', padding: 'var(--spacing-20)', borderRadius: 'var(--radius-lg)', boxShadow: 'var(--shadow-sm)' }}>
                                    {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(day => (<div key={day} style={{ textAlign: 'center', fontWeight: '600', color: 'var(--secondary)', padding: 'var(--spacing-12)', fontSize: '0.875rem' }}>{day}</div>))}
                                    {calendarData.map((dayData, index) => (
                                        <div key={index} style={{ backgroundColor: dayData.isCurrentMonth ? (dayData.hasSales ? 'var(--secondary)' : 'var(--surface-container-lowest)') : 'var(--surface-variant)', color: dayData.isCurrentMonth ? (dayData.hasSales ? 'var(--on-secondary)' : 'var(--on-surface)') : 'var(--on-surface-variant)', padding: 'var(--spacing-12)', borderRadius: 'var(--radius-md)', textAlign: 'center', minHeight: '80px', display: 'flex', flexDirection: 'column', justifyContent: 'space-between', cursor: dayData.hasSales ? 'pointer' : 'default', border: dayData.hasSales ? '2px solid var(--on-secondary)' : '1px solid var(--outline-variant)', transition: 'all 0.3s ease' }}>
                                            <div style={{ fontSize: '1.125rem', fontWeight: '600' }}>{dayData.day}</div>
                                            {dayData.hasSales && (<div style={{ fontSize: '0.75rem', fontWeight: '600' }}>₹{dayData.sales.toFixed(0)}</div>)}
                                        </div>
                                    ))}
                                </div>
                                <div style={{ marginTop: 'var(--spacing-20)', textAlign: 'left', color: 'var(--on-surface-variant)' }}>
                                    <p style={{ margin: 0, fontWeight: '600', marginBottom: 'var(--spacing-12)' }}>Legend:</p>
                                    <div style={{ display: 'flex', gap: 'var(--spacing-20)', flexWrap: 'wrap' }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--spacing-8)' }}><div style={{ width: '20px', height: '20px', backgroundColor: 'var(--surface-container-lowest)', border: '1px solid var(--outline-variant)', borderRadius: 'var(--radius-md)' }}></div><span>No Sales</span></div>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--spacing-8)' }}><div style={{ width: '20px', height: '20px', backgroundColor: 'var(--secondary)', border: '2px solid var(--on-secondary)', borderRadius: 'var(--radius-md)' }}></div><span>Has Sales (₹ amount shown)</span></div>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--spacing-8)' }}><div style={{ width: '20px', height: '20px', backgroundColor: 'var(--surface-variant)', borderRadius: 'var(--radius-md)' }}></div><span>Other Month</span></div>
                                    </div>
                                </div>
                            </div>
                        )}
                        {ledgerView === 'table' ? (
                            <div>
                                <div style={{ backgroundColor: 'var(--surface-container-low)', padding: 'var(--spacing-16)', borderRadius: 'var(--radius-lg)', marginBottom: 'var(--spacing-20)', boxShadow: 'var(--shadow-sm)' }}>
                                    <h4 style={{ color: 'var(--secondary)', marginTop: 0, marginBottom: 'var(--spacing-16)' }}><span className="material-icons" style={{ verticalAlign: 'middle', marginRight: 'var(--spacing-8)' }}>filter_list</span>Filter Sales</h4>
                                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 'var(--spacing-16)' }}>
                                        <div><label style={{ color: 'var(--on-surface)', display: 'block', marginBottom: 'var(--spacing-8)', fontSize: '0.875rem', fontWeight: '500' }}>Date From:</label><input type="date" value={tableFilters.dateFrom} onChange={(e) => setTableFilters(prev => ({ ...prev, dateFrom: e.target.value }))} style={{ width: '100%', padding: 'var(--spacing-8)', backgroundColor: 'var(--surface-container-highest)', color: 'var(--on-surface)', border: '1px solid var(--outline-variant)', borderBottom: '2px solid var(--primary)', borderRadius: 'var(--radius-md) var(--radius-md) 0 0' }} /></div>
                                        <div><label style={{ color: 'var(--on-surface)', display: 'block', marginBottom: 'var(--spacing-8)', fontSize: '0.875rem', fontWeight: '500' }}>Date To:</label><input type="date" value={tableFilters.dateTo} onChange={(e) => setTableFilters(prev => ({ ...prev, dateTo: e.target.value }))} style={{ width: '100%', padding: 'var(--spacing-8)', backgroundColor: 'var(--surface-container-highest)', color: 'var(--on-surface)', border: '1px solid var(--outline-variant)', borderBottom: '2px solid var(--primary)', borderRadius: 'var(--radius-md) var(--radius-md) 0 0' }} /></div>
                                        <div><label style={{ color: 'var(--on-surface)', display: 'block', marginBottom: 'var(--spacing-8)', fontSize: '0.875rem', fontWeight: '500' }}>Invoice Search:</label><input type="text" placeholder="Search invoice number..." value={tableFilters.invoiceSearch} onChange={(e) => setTableFilters(prev => ({ ...prev, invoiceSearch: e.target.value }))} style={{ width: '100%', padding: 'var(--spacing-8)', backgroundColor: 'var(--surface-container-highest)', color: 'var(--on-surface)', border: '1px solid var(--outline-variant)', borderBottom: '2px solid var(--primary)', borderRadius: 'var(--radius-md) var(--radius-md) 0 0' }} /></div>
                                        <div><label style={{ color: 'var(--on-surface)', display: 'block', marginBottom: 'var(--spacing-8)', fontSize: '0.875rem', fontWeight: '500' }}>Min Amount (₹):</label><input type="number" placeholder="0" value={tableFilters.minAmount} onChange={(e) => setTableFilters(prev => ({ ...prev, minAmount: e.target.value }))} style={{ width: '100%', padding: 'var(--spacing-8)', backgroundColor: 'var(--surface-container-highest)', color: 'var(--on-surface)', border: '1px solid var(--outline-variant)', borderBottom: '2px solid var(--primary)', borderRadius: 'var(--radius-md) var(--radius-md) 0 0' }} /></div>
                                        <div><label style={{ color: 'var(--on-surface)', display: 'block', marginBottom: 'var(--spacing-8)', fontSize: '0.875rem', fontWeight: '500' }}>Max Amount (₹):</label><input type="number" placeholder="0" value={tableFilters.maxAmount} onChange={(e) => setTableFilters(prev => ({ ...prev, maxAmount: e.target.value }))} style={{ width: '100%', padding: 'var(--spacing-8)', backgroundColor: 'var(--surface-container-highest)', color: 'var(--on-surface)', border: '1px solid var(--outline-variant)', borderBottom: '2px solid var(--primary)', borderRadius: 'var(--radius-md) var(--radius-md) 0 0' }} /></div>
                                        <div style={{ display: 'flex', alignItems: 'end' }}><button onClick={() => setTableFilters({ dateFrom: '', dateTo: '', invoiceSearch: '', minAmount: '', maxAmount: '' })} style={{ width: '100%', padding: 'var(--spacing-8)', backgroundColor: 'var(--error-container)', color: 'var(--error)', border: 'none', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontWeight: '600' }}>Clear Filters</button></div>
                                    </div>
                                </div>
                                <div style={{ backgroundColor: 'var(--surface-container-low)', borderRadius: 'var(--radius-lg)', overflow: 'hidden', boxShadow: 'var(--shadow-sm)' }}>
                                    <table style={{ width: '100%', borderCollapse: 'collapse', backgroundColor: 'var(--surface-container-low)', color: 'var(--on-surface)' }}>
                                        <thead style={{ backgroundColor: 'var(--primary-container)' }}>
                                            <tr>
                                                <th style={{ padding: 'var(--spacing-12) var(--spacing-16)', textAlign: 'left', fontWeight: '600', color: 'var(--on-primary-container)', borderBottom: '1px solid var(--outline-variant)' }}>Date</th>
                                                <th style={{ padding: 'var(--spacing-12) var(--spacing-16)', textAlign: 'left', fontWeight: '600', color: 'var(--on-primary-container)', borderBottom: '1px solid var(--outline-variant)' }}>Invoice No.</th>
                                                <th style={{ padding: 'var(--spacing-12) var(--spacing-16)', textAlign: 'left', fontWeight: '600', color: 'var(--on-primary-container)', borderBottom: '1px solid var(--outline-variant)' }}>Items Sold</th>
                                                <th style={{ padding: 'var(--spacing-12) var(--spacing-16)', textAlign: 'left', fontWeight: '600', color: 'var(--on-primary-container)', borderBottom: '1px solid var(--outline-variant)' }}>Discount</th>
                                                <th style={{ padding: 'var(--spacing-12) var(--spacing-16)', textAlign: 'left', fontWeight: '600', color: 'var(--on-primary-container)', borderBottom: '1px solid var(--outline-variant)' }}>Grand Total</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {(() => {
                                                const filteredSales = filterSalesLedger([...salesLedger].reverse());
                                                return filteredSales.length === 0 ? (<tr><td colSpan="5" style={{ textAlign: 'center', color: 'var(--on-surface-variant)', padding: 'var(--spacing-20)', fontStyle: 'italic' }}>No sales match the current filters.</td></tr>) :
                                                    filteredSales.map((sale, i) => (
                                                        <tr key={i} style={{ borderBottom: '1px solid var(--outline-variant)', backgroundColor: i % 2 === 0 ? 'var(--surface-container-low)' : 'var(--surface-container-highest)' }}>
                                                            <td style={{ padding: 'var(--spacing-12) var(--spacing-16)' }}>{new Date(sale.date).toLocaleString()}</td>
                                                            <td style={{ padding: 'var(--spacing-12) var(--spacing-16)', fontFamily: 'var(--font-family-mono)' }}>{sale.invoiceNo}</td>
                                                            <td style={{ padding: 'var(--spacing-12) var(--spacing-16)' }}>{sale.items.reduce((sum, item) => sum + item.qty, 0)} items</td>
                                                            <td style={{ padding: 'var(--spacing-12) var(--spacing-16)' }}>{sale.discountPercentage}%</td>
                                                            <td style={{ padding: 'var(--spacing-12) var(--spacing-16)', fontWeight: '600', color: 'var(--primary)' }}>₹{sale.grandTotal.toFixed(2)}</td>
                                                        </tr>
                                                    ));
                                            })()}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : ledgerView === 'chart' ? (
                            <div style={{ backgroundColor: 'var(--surface-container-low)', padding: 'var(--spacing-20)', borderRadius: 'var(--radius-lg)', boxShadow: 'var(--shadow-sm)' }}>
                                <canvas ref={chartCanvasRef}></canvas>
                            </div>
                        ) : null}
                    </div>
                );
            };

            // 3.5 Sales Analytics Tab
            const exportSalesDataToPDF = (salesmenName, period, data, stats) => {
                if (!window.jsPDF) {
                    alert('PDF library not loaded. Please try again.');
                    return;
                }

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();
                let yPosition = 15;
                const margin = 10;
                const maxWidth = pageWidth - (2 * margin);

                // Add header
                doc.setFontSize(18);
                doc.setFont(undefined, 'bold');
                doc.text('A2Z Collection - Sales Report', margin, yPosition);
                yPosition += 10;

                // Add report info
                doc.setFontSize(11);
                doc.setFont(undefined, 'normal');
                doc.text(`Salesman: ${salesmenName}`, margin, yPosition);
                yPosition += 6;
                doc.text(`Period: ${getPeriodLabel(period)}`, margin, yPosition);
                yPosition += 6;
                doc.text(`Generated: ${new Date().toLocaleDateString('en-IN')} ${new Date().toLocaleTimeString()}`, margin, yPosition);
                yPosition += 10;

                // Add stats
                doc.setFont(undefined, 'bold');
                doc.text('Summary Statistics', margin, yPosition);
                yPosition += 6;
                doc.setFont(undefined, 'normal');
                doc.setFontSize(10);
                doc.text(`Total Sales: ₹${stats.totalSales.toFixed(2)}`, margin, yPosition);
                yPosition += 5;
                doc.text(`Total Invoices: ${stats.totalInvoices}`, margin, yPosition);
                yPosition += 5;
                doc.text(`Average Sale: ₹${stats.avgSale.toFixed(2)}`, margin, yPosition);
                yPosition += 8;

                // Add table
                if (data && data.length > 0) {
                    const columns = ['Invoice No.', 'Date', 'Amount (₹)', 'Discount', 'Grand Total (₹)'];
                    const rows = data.map(sale => [
                        sale.invoiceNo,
                        new Date(sale.date).toLocaleDateString('en-IN'),
                        sale.subtotal.toFixed(2),
                        sale.discountPercentage > 0 ? `${sale.discountPercentage}%` : 'None',
                        sale.grandTotal.toFixed(2)
                    ]);

                    doc.autoTable({
                        startY: yPosition,
                        head: [columns],
                        body: rows,
                        margin: { top: margin, left: margin, right: margin },
                        columnStyles: {
                            0: { cellWidth: 30 },
                            1: { cellWidth: 30 },
                            2: { cellWidth: 25 },
                            3: { cellWidth: 25 },
                            4: { cellWidth: 30 }
                        },
                        headStyles: {
                            fillColor: [0, 20, 81],
                            textColor: 255,
                            fontStyle: 'bold'
                        },
                        bodyStyles: {
                            textColor: 30
                        },
                        alternateRowStyles: {
                            fillColor: [232, 242, 253]
                        }
                    });
                }

                // Download PDF
                const filename = `Sales_Report_${salesmenName}_${new Date().getTime()}.pdf`;
                doc.save(filename);
            };

            const renderSalesAnalyticsTab = () => {
                const salesmenList = uniqueSalesmen;
                const currentSalesmen = selectedSalesman || (salesmenList.length > 0 ? salesmenList[0] : '');
                const salesData = currentSalesmen ? getSalesmanSales(currentSalesmen, salesAnalyticsPeriod) : [];
                const totalSales = salesData.reduce((sum, s) => sum + s.grandTotal, 0);
                const totalInvoices = salesData.length;
                const avgSale = totalInvoices > 0 ? totalSales / totalInvoices : 0;

                return (
                    <div className="card">
                        <h2 style={{ marginTop: 0, marginBottom: 'var(--spacing-16)' }}>Sales Analytics - Salesman Performance</h2>

                        {/* Filters Section */}
                        <div style={{ backgroundColor: 'var(--surface-container-low)', padding: 'var(--spacing-20)', borderRadius: 'var(--radius-lg)', marginBottom: 'var(--spacing-20)', boxShadow: 'var(--shadow-sm)' }}>

                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: 'var(--spacing-16)' }}>
                                <div>
                                    <label style={{ color: 'var(--on-surface)', display: 'block', marginBottom: 'var(--spacing-8)', fontSize: '0.875rem', fontWeight: '500' }}>Select Salesman</label>                                    <select value={selectedSalesman || (salesmenList.length > 0 ? salesmenList[0] : '')} onChange={(e) => setSelectedSalesman(e.target.value)} style={{ width: '100%', padding: 'var(--spacing-8)', backgroundColor: 'var(--surface-container-highest)', color: 'var(--on-surface)', border: '1px solid var(--outline-variant)', borderBottom: '2px solid var(--primary)', borderRadius: 'var(--radius-md) var(--radius-md) 0 0' }}>
                                        <option value="">-- Select a Salesman --</option>
                                        {salesmenList.map(name => <option key={name} value={name}>{name}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label style={{ color: 'var(--on-surface)', display: 'block', marginBottom: 'var(--spacing-8)', fontSize: '0.875rem', fontWeight: '500' }}>Period</label>

                                        <option value="today">Today</option>
                                        <option value="week">This Week</option>
                                        <option value="month">This Month</option>
                                        <option value="quarter">This Quarter</option>
                                        <option value="custom">Custom Date Range</option>
                                    </select>
                                </div>
                                {salesAnalyticsPeriod === 'custom' && (
                                    <>
                                        <div>
                                            <label style={{ color: 'var(--on-surface)', display: 'block', marginBottom: 'var(--spacing-8)', fontSize: '0.875rem', fontWeight: '500' }}>Date From</label>
                                            <input type="date" value={salesAnalyticsDateFrom} onChange={(e) => setSalesAnalyticsDateFrom(e.target.value)} style={{ width: '100%', padding: 'var(--spacing-8)', backgroundColor: 'var(--surface-container-highest)', color: 'var(--on-surface)', border: '1px solid var(--outline-variant)', borderBottom: '2px solid var(--primary)', borderRadius: 'var(--radius-md) var(--radius-md) 0 0' }} />
                                        </div>
                                        <div>
                                            <label style={{ color: 'var(--on-surface)', display: 'block', marginBottom: 'var(--spacing-8)', fontSize: '0.875rem', fontWeight: '500' }}>Date To</label>
                                            <input type="date" value={salesAnalyticsDateTo} onChange={(e) => setSalesAnalyticsDateTo(e.target.value)} style={{ width: '100%', padding: 'var(--spacing-8)', backgroundColor: 'var(--surface-container-highest)', color: 'var(--on-surface)', border: '1px solid var(--outline-variant)', borderBottom: '2px solid var(--primary)', borderRadius: 'var(--radius-md) var(--radius-md) 0 0' }} />
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>

                        {/* Stats Section */}
                        {currentSalesmen && (
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 'var(--spacing-16)', marginBottom: 'var(--spacing-20)' }}>
                                <div style={{ backgroundColor: 'var(--primary-container)', padding: 'var(--spacing-16)', borderRadius: 'var(--radius-lg)', textAlign: 'center' }}>
                                    <div style={{ fontSize: '0.875rem', color: 'var(--on-primary-container)', marginBottom: 'var(--spacing-8)' }}>Total Sales</div>
                                    <div style={{ fontSize: '1.75rem', fontWeight: 'bold', color: 'var(--on-primary-container)' }}>₹{totalSales.toFixed(2)}</div>
                                </div>
                                <div style={{ backgroundColor: 'var(--secondary-container)', padding: 'var(--spacing-16)', borderRadius: 'var(--radius-lg)', textAlign: 'center' }}>
                                    <div style={{ fontSize: '0.875rem', color: 'var(--on-secondary-container)', marginBottom: 'var(--spacing-8)' }}>Total Invoices</div>
                                    <div style={{ fontSize: '1.75rem', fontWeight: 'bold', color: 'var(--on-secondary-container)' }}>{totalInvoices}</div>
                                </div>
                                <div style={{ backgroundColor: 'var(--success-container)', padding: 'var(--spacing-16)', borderRadius: 'var(--radius-lg)', textAlign: 'center' }}>
                                    <div style={{ fontSize: '0.875rem', color: 'var(--on-success-container)', marginBottom: 'var(--spacing-8)' }}>Average Sale</div>
                                    <div style={{ fontSize: '1.75rem', fontWeight: 'bold', color: 'var(--on-success-container)' }}>₹{avgSale.toFixed(2)}</div>
                                </div>
                                <div style={{ backgroundColor: 'var(--tertiary-container)', padding: 'var(--spacing-16)', borderRadius: 'var(--radius-lg)', textAlign: 'center' }}>
                                    <div style={{ fontSize: '0.875rem', color: 'var(--on-tertiary-container)', marginBottom: 'var(--spacing-8)' }}>Period</div>
                                    <div style={{ fontSize: '1rem', fontWeight: 'bold', color: 'var(--on-tertiary-container)' }}>{getPeriodLabel(salesAnalyticsPeriod)}</div>
                                </div>
                            </div>
                        )}

                        {/* Chart Section */}
                        {currentSalesmen ? (
                            <div style={{ backgroundColor: 'var(--surface-container-low)', padding: 'var(--spacing-20)', borderRadius: 'var(--radius-lg)', boxShadow: 'var(--shadow-sm)' }}>
                                <canvas ref={salesAnalyticsCanvasRef} style={{ maxHeight: '400px' }}></canvas>
                            </div>
                        ) : (
                            <div style={{ textAlign: 'center', color: 'var(--on-surface-variant)', padding: 'var(--spacing-32)' }}>Please select a salesman to view analytics.</div>
                        )}

                        {/* Sales Details Table */}
                        {currentSalesmen && salesData.length > 0 && (
                            <div style={{ marginTop: 'var(--spacing-20)' }}>
                                <h4 style={{ color: 'var(--secondary)', marginBottom: 'var(--spacing-16)' }}>Sales Details ({salesData.length} invoices)</h4>
                                <div style={{ backgroundColor: 'var(--surface-container-low)', borderRadius: 'var(--radius-lg)', overflow: 'auto', boxShadow: 'var(--shadow-sm)' }}>
                                    <table style={{ width: '100%', borderCollapse: 'collapse', backgroundColor: 'var(--surface-container-low)', color: 'var(--on-surface)' }}>
                                        <thead style={{ backgroundColor: 'var(--primary-container)' }}>
                                            <tr>
                                                <th style={{ padding: 'var(--spacing-12) var(--spacing-16)', textAlign: 'left', fontWeight: '600', color: 'var(--on-primary-container)', borderBottom: '1px solid var(--outline-variant)' }}>Invoice No.</th>
                                                <th style={{ padding: 'var(--spacing-12) var(--spacing-16)', textAlign: 'left', fontWeight: '600', color: 'var(--on-primary-container)', borderBottom: '1px solid var(--outline-variant)' }}>Date</th>
                                                <th style={{ padding: 'var(--spacing-12) var(--spacing-16)', textAlign: 'left', fontWeight: '600', color: 'var(--on-primary-container)', borderBottom: '1px solid var(--outline-variant)' }}>Amount (₹)</th>
                                                <th style={{ padding: 'var(--spacing-12) var(--spacing-16)', textAlign: 'left', fontWeight: '600', color: 'var(--on-primary-container)', borderBottom: '1px solid var(--outline-variant)' }}>Discount</th>
                                                <th style={{ padding: 'var(--spacing-12) var(--spacing-16)', textAlign: 'left', fontWeight: '600', color: 'var(--on-primary-container)', borderBottom: '1px solid var(--outline-variant)' }}>Grand Total (₹)</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {salesData.map((sale, idx) => (
                                                <tr key={idx} style={{ borderBottom: '1px solid var(--outline-variant)' }}>
                                                    <td style={{ padding: 'var(--spacing-12) var(--spacing-16)', color: 'var(--on-surface)' }}>{sale.invoiceNo}</td>
                                                    <td style={{ padding: 'var(--spacing-12) var(--spacing-16)', color: 'var(--on-surface)' }}>{new Date(sale.date).toLocaleDateString('en-IN')}</td>
                                                    <td style={{ padding: 'var(--spacing-12) var(--spacing-16)', color: 'var(--on-surface)' }}>₹{sale.subtotal.toFixed(2)}</td>
                                                    <td style={{ padding: 'var(--spacing-12) var(--spacing-16)', color: sale.discountPercentage > 0 ? 'var(--success)' : 'var(--on-surface)' }}>{sale.discountPercentage > 0 ? `${sale.discountPercentage}% (-₹${sale.discountAmount.toFixed(2)})` : 'None'}</td>
                                                    <td style={{ padding: 'var(--spacing-12) var(--spacing-16)', fontWeight: '600', color: 'var(--primary)' }}>₹{sale.grandTotal.toFixed(2)}</td>
                                                </tr>

                                        </tbody>
                                    </table>
                                </div>
                            </div>

                                    <span className="material-icons" style={{ fontSize: '20px' }}>file_download</span>

                            </div>

                        <h3>{isEditing ? `Edit Product: ${product.id}` : 'Add New Product'}</h3>
                        <form onSubmit={handleSubmit}>
                            <div className="form-group"><label>Product ID</label><input type="text" value={product.id} readOnly style={{ color: '#aaa' }} /></div>
                            <div className="form-group"><label>Product Name</label><input type="text" name="name" value={product.name} onChange={handleInputChange} required /></div>
                            <div className="row-group">
                                <div><label>Category</label><input type="text" name="category" list="categoryOptions" value={product.category} onChange={handleInputChange} placeholder="Select or type..." required /><datalist id="categoryOptions">{uniqueCategories.map((cat, i) => <option key={i} value={cat} />)}</datalist></div>
                                <div><label>Gender</label><select name="gender" value={product.gender} onChange={handleInputChange}><option value="Male">Male</option><option value="Female">Female</option><option value="Unisex">Unisex</option></select></div>
                            </div>
                            <div className="row-group" style={{ marginTop: '15px' }}>
                                <div><label>Cost Price</label><div className="input-wrapper"><span className="currency-symbol">₹</span><input type="number" name="costPrice" value={product.costPrice} onChange={handleInputChange} min="0" required /></div></div>
                                <div><label>Sell Price (MRP)</label><div className="input-wrapper"><span className="currency-symbol">₹</span><input type="number" name="sellPrice" value={product.sellPrice} onChange={handleInputChange} min="0" required /></div></div>
                            </div>
                            <div className="form-group" style={{ marginTop: '15px' }}>
                                <label>Images (Max 5)</label><input id="imageInput" type="file" multiple accept="image/*" onChange={handleImageUpload} />
                                {product.images.length > 0 && (<div style={{ marginTop: '15px', display: 'flex', gap: '10px', flexWrap: 'wrap' }}>{product.images.map((imgSrc, index) => (<img key={index} src={imgSrc} alt="Preview" className="img-preview" />))}</div>)}
                            </div>
                            <div className="form-group" style={{ marginTop: '15px', border: '1px solid var(--outline-variant)', borderRadius: 'var(--radius-md)', padding: '15px', backgroundColor: 'var(--surface-container-low)' }}>
                                <label style={{ fontWeight: 700, display: 'block', marginBottom: '12px', fontSize: '1rem' }}>{variantInput.colorName ? 'Modify Variant' : 'Add Color/Size/Stock Variant'}</label>
                                <div className="row-group" style={{ gap: '12px' }}>
                                    <div><label style={{ fontSize: '0.85rem' }}>Color Name</label><input type="text" name="colorName" value={variantInput.colorName} onChange={handleVariantInputChange} placeholder="e.g. Red" /></div>
                                    <div><label style={{ fontSize: '0.85rem' }}>Color Code (hex or short)</label><input type="text" name="colorCode" value={variantInput.colorCode} onChange={handleVariantInputChange} placeholder="#FF0000 or RED" /></div>
                                    <div><label style={{ fontSize: '0.85rem' }}>Size</label><select name="size" value={variantInput.size} onChange={handleVariantInputChange}>{sizeOptions.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                                    <div><label style={{ fontSize: '0.85rem' }}>Stock Qty</label><input type="number" name="stockQty" value={variantInput.stockQty} onChange={handleVariantInputChange} min="0" /></div>
                                    <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'flex-end', gap: '6px' }}><button type="button" className="btn-sm btn-edit" onClick={addVariant} style={{ height: '36px', padding: '0 16px' }}>{variantInput.colorName ? 'Update/Save Variant' : 'Add Variant'}</button>{variantInput.colorName && (<button type="button" className="btn-sm" onClick={clearVariantInput} style={{ height: '36px', padding: '0 16px', backgroundColor: 'var(--surface-variant)', color: 'var(--on-surface-variant)' }}>Cancel</button>)}</div>
                                </div>
                                {product.variants && product.variants.length > 0 && (
                                    <div style={{ marginTop: '15px', backgroundColor: 'var(--surface-container-low)', padding: '12px', borderRadius: 'var(--radius-md)' }}>
                                        <strong style={{ display: 'block', marginBottom: '10px' }}>Variants:</strong>
                                        {product.variants.map((v, i) => (
                                            <div key={v.barcode} style={{ backgroundColor: 'var(--surface-container-highest)', border: '1px solid var(--outline-variant)', borderRadius: 'var(--radius-md)', padding: '12px', marginBottom: '10px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '12px' }}>
                                                <div style={{ flex: 1 }}>
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '6px' }}>
                                                        <span style={{ fontWeight: 700, fontSize: '1rem' }}>{v.colorName}</span>
                                                        <span className="size-badge">{v.size}</span>
                                                        <span style={{ color: 'var(--on-surface-variant)', fontSize: '0.9rem' }}>Stock: {v.stockQty}</span>
                                                    </div>
                                                    <div style={{ marginTop: '8px' }}>
                                                        <div style={{ color: 'var(--on-surface-variant)', fontSize: '0.85rem', marginBottom: '4px' }}>Barcode: <span style={{ fontFamily: 'monospace', fontWeight: 600 }}>{v.barcode}</span></div>
                                                        <div className="barcode-container" style={{ marginTop: '6px', padding: '8px', backgroundColor: '#fff', borderRadius: '4px' }}>
                                                            <svg id={`barcode-variant-${i}`}></svg>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div style={{ display: 'flex', gap: '6px', flexDirection: 'column' }}>
                                                    <button type="button" className="btn-sm" style={{ backgroundColor: 'var(--primary)', color: 'white', padding: '6px 8px', display: 'flex', alignItems: 'center', gap: '4px' }} onClick={() => duplicateVariant(v)} title="Duplicate this variant"><span className="material-icons" style={{ fontSize: '18px' }}>content_copy</span></button>
                                                    <button type="button" className="btn-sm" style={{ backgroundColor: 'var(--success)', color: 'white', padding: '6px 8px', display: 'flex', alignItems: 'center', gap: '4px' }} onClick={() => printVariantBarcode(v, v.colorName)} title="Print this barcode"><span className="material-icons" style={{ fontSize: '18px' }}>print</span></button>
                                                    <button type="button" className="btn-sm btn-delete" onClick={() => removeVariant(v.barcode)}><span className="material-icons">delete</span></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                            <button type="submit" className="action-btn">{isEditing ? 'Update Product & Inventory' : 'Save Product to Inventory'}</button>

                        </form>

                        <div style={{ marginTop: '40px' }}>
                            <h3 style={{ borderBottom: '1px solid var(--outline-variant)', paddingBottom: '10px' }}>Current Inventory List</h3>
                            {catalog.map((item, index) => (
                                <div key={index} style={{ borderBottom: '1px solid var(--surface-container-high)', padding: '15px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                                    <div style={{ flex: 1 }}>
                                        <strong>{item.name}</strong>
                                        {item.variants && item.variants.map((v, vi) => (
                                            <span key={v.barcode} className="size-badge" style={{ marginLeft: '8px' }}>{v.colorName} / {v.size} / Stock: {v.stockQty}</span>
                                        ))}
                                        <br />
                                        <small style={{ color: 'var(--on-surface-variant)' }}>{item.id} | MRP: ₹{item.sellPrice}</small>
                                    </div>
                                    <div>
                                        <button onClick={() => handleEdit(item)} className="btn-sm btn-edit"><span className="material-icons">edit</span></button>
                                        <button onClick={() => handleDelete(item.id)} className="btn-sm btn-delete"><span className="material-icons">delete</span></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            // 5. Invoices Tab
            const renderInvoicesTab = () => {
                // Get unique days and referrers from sales ledger
                const uniqueDays = useMemo(() => {
                    const days = new Set();
                    salesLedger.forEach(sale => {
                        const date = new Date(sale.date).toLocaleDateString('en-IN');
                        days.add(date);
                    });
                    return Array.from(days).sort().reverse();
                }, [salesLedger]);

                const uniqueReferrersInvoices = useMemo(() => {
                    const names = new Set();
                    salesLedger.forEach(sale => {
                        if (sale.referrer) names.add(sale.referrer);
                    });
                    return Array.from(names).sort();
                }, [salesLedger]);

                // Filter invoices
                const filteredInvoices = useMemo(() => {
                    return salesLedger.filter(sale => {
                        const saleDay = new Date(sale.date).toLocaleDateString('en-IN');
                        const matchDay = !invoiceFilterDay || saleDay === invoiceFilterDay;
                        const matchReferrer = !invoiceFilterReferrer || sale.referrer === invoiceFilterReferrer;
                        return matchDay && matchReferrer;
                    }).sort((a, b) => new Date(b.date) - new Date(a.date));
                }, [salesLedger, invoiceFilterDay, invoiceFilterReferrer]);

                return (
                    <div className="card">
                        <h2 style={{ marginTop: 0, marginBottom: 'var(--spacing-16)' }}>Invoices</h2>

                        {/* Filters Section */}
                        <div style={{ backgroundColor: 'var(--surface-container-low)', padding: 'var(--spacing-20)', borderRadius: 'var(--radius-lg)', marginBottom: 'var(--spacing-20)', boxShadow: 'var(--shadow-sm)' }}>
